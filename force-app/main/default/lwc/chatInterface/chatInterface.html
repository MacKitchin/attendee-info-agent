<template>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <lightning-icon icon-name="standard:bot" size="small" class="header-icon"></lightning-icon>
            <h2>Salesforce Data Assistant</h2>
        </div>

        <!-- Messages Area -->
        <div class="chat-messages">
            <template if:true={hasMessages}>
                <template for:each={messages} for:item="message">
                    <div key={message.id} class="message-container">
                        <!-- User Message -->
                        <template if:true={message.isUser}>
                            <div class="message user-message">
                                <div class="message-content">
                                    <p>{message.message}</p>
                                </div>
                                <div class="message-avatar">
                                    <lightning-icon icon-name="standard:user" size="x-small"></lightning-icon>
                                </div>
                            </div>
                        </template>

                        <!-- AI Message -->
                        <template if:false={message.isUser}>
                            <div class="message ai-message">
                                <div class="message-avatar">
                                    <lightning-icon icon-name="standard:bot" size="x-small"></lightning-icon>
                                </div>
                                <div class="message-content">
                                    <p>{message.response}</p>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </template>

            <!-- Welcome Message -->
            <template if:false={hasMessages}>
                <div class="welcome-message">
                    <lightning-icon icon-name="standard:bot" size="large" class="welcome-icon"></lightning-icon>
                    <h3>Welcome to your Salesforce Data Assistant!</h3>
                    <p>Ask me questions about your data. I can help you with:</p>
                    <ul>
                        <li>Account information and customer data</li>
                        <li>Opportunity pipeline and deals</li>
                        <li>Lead status and conversion</li>
                        <li>Contact details and relationships</li>
                        <li>Sales performance and revenue</li>
                    </ul>
                    <p><strong>Try asking:</strong> "Show me my recent accounts" or "What's my sales pipeline?"</p>
                </div>
            </template>

            <!-- Loading Indicator -->
            <template if:true={isLoading}>
                <div class="message ai-message">
                    <div class="message-avatar">
                        <lightning-icon icon-name="standard:bot" size="x-small"></lightning-icon>
                    </div>
                    <div class="message-content">
                        <div class="typing-indicator">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Input Area -->
        <div class="chat-input">
            <lightning-textarea
                name="messageInput"
                label="Message"
                label-hidden
                placeholder="Ask me about your Salesforce data..."
                value={currentMessage}
                onchange={handleMessageChange}
                onkeypress={handleKeyPress}
                class="message-input">
            </lightning-textarea>
            <lightning-button
                variant="brand"
                label="Send"
                onclick={handleSendMessage}
                disabled={isSendDisabled}
                class="send-button">
            </lightning-button>
        </div>
    </div>
</template>
